name: e_patrimoniu
version: 1.0.0+1
description: e-Patrimoniu - Evidența bunurilor imobiliare ale unităților administrativ-teritoriale
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Firebase (auth only — Firebase Storage eliminat, fișiere stocate în PostgreSQL) ---
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2

  # --- UI & Vizualizare ---
  flutter_svg: ^2.0.12
  fluttertoast: ^9.0.0
  cached_network_image: ^3.3.0
  flutter_markdown_plus: ^1.0.7
  flutter_pdfview: ^1.3.2
  fl_chart: ^0.70.2

  # --- Fișiere & Media ---
  image_picker: ^1.2.1
  file_picker: ^10.3.8
  path_provider: ^2.1.5
  url_launcher: ^6.2.4
  open_filex: ^4.6.0

  # --- Logică & Utilitare ---
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  rxdart: ^0.28.0

  # --- AI & HTTP ---
  google_generative_ai: ^0.4.7
  http: ^1.2.0

  # --- Storage local ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  # fonts:  # Inter fonts not yet added - app uses system fonts
  #   - family: Inter
