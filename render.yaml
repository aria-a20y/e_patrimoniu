services:
  - type: web
    name: e-patrimoniu-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install --production
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false   # seteaza manual: URL-ul Vercel (ex: https://e-patrimoniu.vercel.app)
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false   # seteaza manual: continutul fisierului serviceAccountKey.json
      - key: DATABASE_URL
        sync: false   # seteaza manual: URL PostgreSQL Render
